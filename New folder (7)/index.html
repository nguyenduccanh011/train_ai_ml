<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V9 ML vs Rule-Based Trading Signals</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #131722; color: #d1d4dc; font-family: -apple-system, 'Segoe UI', sans-serif; }

  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 320px; min-width: 320px;
    background: #1e222d; border-right: 1px solid #2B2B43;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid #2B2B43;
  }
  .sidebar-header h2 { font-size: 16px; color: #2196F3; margin-bottom: 4px; }
  .sidebar-header .model-tag {
    font-size: 11px; color: #888; background: #2B2B43; padding: 2px 8px;
    border-radius: 4px; display: inline-block;
  }
  .stock-list {
    flex: 1; overflow-y: auto; padding: 8px;
  }
  .stock-item {
    padding: 10px 12px; border-radius: 6px; cursor: pointer;
    margin-bottom: 4px; transition: background 0.15s;
  }
  .stock-item:hover { background: #2B2B43; }
  .stock-item.active { background: #2196F3; color: #fff; }
  .stock-item.active .stock-stats { color: rgba(255,255,255,0.8); }
  .stock-item.active .stock-pnl { color: #fff !important; }
  .stock-name { font-weight: 700; font-size: 14px; }
  .stock-rank { font-size: 11px; color: #888; margin-right: 6px; }
  .stock-stats { font-size: 11px; color: #888; }
  .stock-pnl { font-weight: 700; font-size: 13px; }
  .stock-pnl.positive { color: #4caf50; }
  .stock-pnl.negative { color: #ff5252; }
  .stock-row { display: flex; justify-content: space-between; align-items: center; }
  .stock-compare { display: flex; gap: 12px; margin-top: 4px; font-size: 11px; color: #888; }
  .stock-compare .v9-tag { color: #2196F3; }
  .stock-compare .rule-tag { color: #ff9800; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar {
    padding: 12px 16px; border-bottom: 1px solid #2B2B43;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .toolbar h1 { font-size: 20px; font-weight: 700; }
  .toolbar .stats-bar { display: flex; gap: 16px; font-size: 13px; }
  .stat-item { display: flex; align-items: center; gap: 4px; }
  .stat-label { color: #888; }
  .stat-value { font-weight: 600; }
  .stat-value.green { color: #4caf50; }
  .stat-value.red { color: #ff5252; }
  .stat-value.blue { color: #2196F3; }
  .stat-value.orange { color: #ff9800; }

  /* Method toggle */
  .method-toggle {
    display: flex; gap: 4px; margin-left: auto;
  }
  .method-btn {
    padding: 6px 14px; border: 1px solid #2B2B43; border-radius: 4px;
    background: transparent; color: #888; cursor: pointer; font-size: 12px;
    font-weight: 600; transition: all 0.15s;
  }
  .method-btn:hover { border-color: #555; color: #ccc; }
  .method-btn.active-v9 { background: #2196F3; color: #fff; border-color: #2196F3; }
  .method-btn.active-rule { background: #ff9800; color: #fff; border-color: #ff9800; }
  .method-btn.active-both { background: #9c27b0; color: #fff; border-color: #9c27b0; }

  #chart { flex: 1; min-height: 0; }

  /* Trade table */
  .trade-panel {
    height: 220px; min-height: 150px; overflow-y: auto;
    border-top: 1px solid #2B2B43; background: #1a1e2e;
  }
  .trade-panel table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .trade-panel th {
    background: #2B2B43; padding: 6px 10px; text-align: left;
    position: sticky; top: 0; font-weight: 600; color: #888;
  }
  .trade-panel td { padding: 5px 10px; border-bottom: 1px solid #1e222d; }
  .trade-panel tr:hover { background: #252836; }
  .win { color: #4caf50; }
  .loss { color: #ff5252; }
  .method-v9 { color: #2196F3; font-weight: 600; }
  .method-rule { color: #ff9800; font-weight: 600; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; font-size: 16px; color: #888;
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>📊 V9 ML vs Rule-Based</h2>
      <span class="model-tag" id="modelTag">Loading...</span>
    </div>
    <div class="stock-list" id="stockList">
      <div class="loading">Loading data...</div>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">
      <h1 id="symbolTitle">Select a stock</h1>
      <div class="stats-bar" id="statsBar"></div>
      <div class="method-toggle">
        <button class="method-btn active-v9" id="btnV9" onclick="setMethod('v9')">🤖 V9 ML</button>
        <button class="method-btn" id="btnRule" onclick="setMethod('rule')">📏 Rule</button>
        <button class="method-btn" id="btnBoth" onclick="setMethod('both')">⚡ Both</button>
      </div>
    </div>
    <div id="chart">
      <div class="loading">← Select a stock from the list</div>
    </div>
    <div class="trade-panel" id="tradePanel">
      <table>
        <thead>
          <tr>
            <th>Method</th><th>#</th><th>Entry</th><th>Exit</th><th>Days</th><th>PnL %</th><th>Exit Reason</th>
          </tr>
        </thead>
        <tbody id="tradeBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="./node_modules/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script type="module">
import { TradingChartWrapper } from './src/TradingChartWrapper.js';

let data = null;
let wrapper = null;
let currentSymbol = null;
let currentMethod = 'v9'; // 'v9', 'rule', 'both'

window.setMethod = function(method) {
  currentMethod = method;
  // Update button states
  document.getElementById('btnV9').className = 'method-btn' + (method === 'v9' ? ' active-v9' : '');
  document.getElementById('btnRule').className = 'method-btn' + (method === 'rule' ? ' active-rule' : '');
  document.getElementById('btnBoth').className = 'method-btn' + (method === 'both' ? ' active-both' : '');
  if (currentSymbol) selectSymbol(currentSymbol);
};

async function loadData() {
  const resp = await fetch('./stock_signals.json');
  data = await resp.json();
  document.getElementById('modelTag').textContent = data.model + ' | ' + data.generated_at.slice(0, 10);
  renderStockList();
  if (data.rankings.length > 0) selectSymbol(data.rankings[0].symbol);
}

function renderStockList() {
  const list = document.getElementById('stockList');
  list.innerHTML = '';

  data.rankings.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'stock-item';
    item.dataset.symbol = s.symbol;
    const isTop = data.symbols[s.symbol] !== undefined;
    const pnlClass = s.v9_total_pnl >= 0 ? 'positive' : 'negative';

    item.innerHTML = `
      <div class="stock-row">
        <div>
          <span class="stock-rank">#${i + 1}</span>
          <span class="stock-name">${s.symbol}</span>
        </div>
        <div class="stock-stats">
          <div class="stock-pnl ${pnlClass}">V9: ${s.v9_total_pnl >= 0 ? '+' : ''}${s.v9_total_pnl}%</div>
        </div>
      </div>
      <div class="stock-compare">
        <span class="v9-tag">🤖 V9: ${s.v9_trades}t WR${s.v9_wr}% avg${s.v9_avg_pnl >= 0 ? '+' : ''}${s.v9_avg_pnl}%</span>
        <span class="rule-tag">📏 Rule: ${s.rule_trades}t WR${s.rule_wr}% avg${s.rule_avg_pnl >= 0 ? '+' : ''}${s.rule_avg_pnl}%</span>
      </div>
    `;

    item.addEventListener('click', () => {
      if (data.symbols[s.symbol]) selectSymbol(s.symbol);
    });
    if (!isTop) { item.style.opacity = '0.4'; item.style.cursor = 'default'; }
    list.appendChild(item);
  });
}

function selectSymbol(symbol) {
  if (!data.symbols[symbol]) return;
  currentSymbol = symbol;

  document.querySelectorAll('.stock-item').forEach(el => {
    el.classList.toggle('active', el.dataset.symbol === symbol);
  });

  const symData = data.symbols[symbol];
  const v9s = symData.v9_stats;
  const rs = symData.rule_stats;

  document.getElementById('symbolTitle').textContent = symbol;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><span class="stat-label">🤖 V9:</span>
      <span class="stat-value blue">${v9s.trades}t</span>
      <span class="stat-value green">WR${v9s.win_rate}%</span>
      <span class="stat-value ${v9s.avg_pnl >= 0 ? 'green' : 'red'}">${v9s.avg_pnl >= 0 ? '+' : ''}${v9s.avg_pnl}% avg</span>
      <span class="stat-value ${v9s.total_pnl >= 0 ? 'green' : 'red'}">${v9s.total_pnl >= 0 ? '+' : ''}${v9s.total_pnl}% total</span>
    </div>
    <div class="stat-item"><span class="stat-label">📏 Rule:</span>
      <span class="stat-value orange">${rs.trades}t</span>
      <span class="stat-value green">WR${rs.win_rate}%</span>
      <span class="stat-value ${rs.avg_pnl >= 0 ? 'green' : 'red'}">${rs.avg_pnl >= 0 ? '+' : ''}${rs.avg_pnl}% avg</span>
      <span class="stat-value ${rs.total_pnl >= 0 ? 'green' : 'red'}">${rs.total_pnl >= 0 ? '+' : ''}${rs.total_pnl}% total</span>
    </div>
  `;

  // Chart
  const chartEl = document.getElementById('chart');
  if (wrapper) wrapper.destroy();
  chartEl.innerHTML = '';

  wrapper = new TradingChartWrapper(chartEl);
  wrapper.init(window.LightweightCharts);
  wrapper.setData(symData.ohlcv);

  // Build markers based on method
  const markers = [];

  if (currentMethod === 'v9' || currentMethod === 'both') {
    for (const m of symData.v9_markers) {
      if (m.type === 'buy') {
        markers.push({
          time: m.time, position: 'belowBar',
          color: '#2196F3', shape: 'arrowUp',
          text: currentMethod === 'both' ? 'V9↑' : (m.text || 'BUY'),
        });
      } else if (m.type === 'sell') {
        markers.push({
          time: m.time, position: 'aboveBar',
          color: m.color || '#e91e63', shape: 'arrowDown',
          text: currentMethod === 'both' ? `V9 ${m.text}` : (m.text || 'SELL'),
        });
      }
    }
  }

  if (currentMethod === 'rule' || currentMethod === 'both') {
    for (const m of symData.rule_markers) {
      if (m.type === 'buy') {
        markers.push({
          time: m.time, position: 'belowBar',
          color: '#ff9800', shape: 'circle',
          text: currentMethod === 'both' ? 'R↑' : (m.text || 'BUY'),
        });
      } else if (m.type === 'sell') {
        markers.push({
          time: m.time, position: 'aboveBar',
          color: m.color === '#4caf50' ? '#8bc34a' : '#ff6f00',
          shape: 'circle',
          text: currentMethod === 'both' ? `R ${m.text}` : (m.text || 'SELL'),
        });
      }
    }
  }

  wrapper.setMarkers(markers);
  wrapper.fitContent();

  // Trade table
  const tbody = document.getElementById('tradeBody');
  tbody.innerHTML = '';

  let allTrades = [];
  if (currentMethod === 'v9' || currentMethod === 'both') {
    symData.v9_trades.forEach(t => allTrades.push({...t, method: 'V9'}));
  }
  if (currentMethod === 'rule' || currentMethod === 'both') {
    symData.rule_trades.forEach(t => allTrades.push({...t, method: 'Rule'}));
  }
  // Sort by entry date
  allTrades.sort((a, b) => (a.entry_date || '').localeCompare(b.entry_date || ''));

  allTrades.forEach((t, i) => {
    const cls = t.pnl_pct >= 0 ? 'win' : 'loss';
    const methodCls = t.method === 'V9' ? 'method-v9' : 'method-rule';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="${methodCls}">${t.method === 'V9' ? '🤖' : '📏'} ${t.method}</td>
      <td>${i + 1}</td>
      <td>${t.entry_date}</td>
      <td>${t.exit_date}</td>
      <td>${t.holding_days}d</td>
      <td class="${cls}">${t.pnl_pct >= 0 ? '+' : ''}${t.pnl_pct.toFixed(2)}%</td>
      <td>${t.exit_reason}</td>
    `;
    tbody.appendChild(tr);
  });
}

loadData().catch(err => {
  console.error('Failed to load data:', err);
  document.getElementById('stockList').innerHTML = '<div class="loading">Error loading stock_signals.json</div>';
});
</script>
</body>
</html>
