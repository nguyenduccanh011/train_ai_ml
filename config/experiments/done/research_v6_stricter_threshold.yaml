name: research_v6_stricter_threshold
hypothesis: |
  Test stricter signal threshold (0.01 vs 0.005).
  Rationale: Alpha Gate had 210 trades (19.1% of 1101 buy signals).
  Stricter threshold = fewer but higher-conviction trades.
  Technical rules baseline (-41%) had only 74 trades vs 210.
  Maybe quality > quantity.
strategy: entry_exit_ensemble
market: vn_stock
seed: 42

components:
  features: leading_v2
  target:
    type: forward_return_regression
    horizon: 5

  entry_model:
    type: lightgbm
    params:
      n_estimators: 300
      learning_rate: 0.05
      num_leaves: 31

  exit_model:
    type: lightgbm
    enabled: false

split:
  type: purged_kfold
  n_splits: 6
  embargo_days: 10
  label_horizon: 5

engine:
  max_hold_bars: 20
  min_hold_bars: 1
  hard_stop_pct: -0.08
  costs:
    commission: 0.0025
    tax: 0.001
    slippage: 0.0015

signal_threshold: 0.01

validation:
  n_seeds: 20
  bootstrap_iterations: 1000
  compute_dsr: true
  compute_pbo: true

strict_audit: true

