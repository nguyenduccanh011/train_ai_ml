name: alpha_gate_v3_rf
hypothesis: |
  Test leading_v3 features (cross-sectional rank, sector-relative, regime interaction)
  with RandomForest model (best performer from v1-v10 batch).

  Rationale: v5 RandomForest outperformed all others (-90% vs -109% LGB baseline),
  suggesting overfitting in complex models when features are weak. leading_v3
  adds 22 features (cross-sectional, sector, regime, liquidity) to provide
  stronger edge. Expect: RandomForest + v3 features → pass Alpha Gate.

  Success criteria: DSR > 0.5, return > 12%, DD < 25%

strategy: entry_exit_ensemble
market: vn_stock
seed: 42

components:
  features: leading_v3
  target:
    type: forward_return_regression
    horizon: 5

  entry_model:
    type: random_forest
    params:
      n_estimators: 300
      max_depth: 15
      max_samples: 0.8
      min_samples_split: 5
      min_samples_leaf: 2

  exit_model:
    type: random_forest
    enabled: false

split:
  type: purged_kfold
  n_splits: 6
  embargo_days: 10
  label_horizon: 5

engine:
  max_hold_bars: 20
  min_hold_bars: 1
  hard_stop_pct: -0.08
  costs:
    commission: 0.0025
    tax: 0.001
    slippage: 0.0015

signal_threshold: 0.005

validation:
  n_seeds: 20
  bootstrap_iterations: 1000
  compute_dsr: true
  compute_pbo: true

strict_audit: true
