market: vn_derivatives_30m
name: deriv_30m_top1
color: "#FF6B35"
strategy: v22
runner: src.components.runners.run_v22
components:
  features: leading
  target:
    type: early_wave_v2
    forward_window: 10
    gain_threshold: 0.008
    loss_threshold: 0.003
  entry_model:
    type: random_forest
    device: cpu
    extras: {}
  exit_model:
    enabled: true
    type: lightgbm
    forward_window: 48
    loss_threshold: 0.023
    extras: {}
split:
  method: walk_forward
  train_years: 4
  test_years: 1
  gap_days: 0
  first_test_year: 2020
  last_test_year: 2025
mods:
  a: true
  b: true
  c: false
  d: false
  e: true
  f: true
  g: true
  h: true
  i: true
  j: true
params:
  signal_exit_enabled: false
  patch_active_exit_on_raw0: true
  v19_min_entry_score: 0
  v22_mode: true
  v22_fast_exit_skip_strong: true
  v22_fast_exit_vol_confirm: true
  v22_fast_exit_threshold_hb: -0.07
  v22_fast_exit_threshold_std: -0.05
  v22_adaptive_hard_cap: true
  v22_hard_cap_mult_hb: 3.0
  v22_hard_cap_mult_std: 2.5
  v22_hard_cap_floor: 0.12
  v22_hard_cap_floor_hb: 0.15
fusion:
  entry:
    - name: v19_entry_cascade
  force_exit:
    - name: hard_stop_exit
  active_exit:
    - name: exit_model
    - name: peak_protect_dist
  hold: []
