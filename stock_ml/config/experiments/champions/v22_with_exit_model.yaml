name: v22_with_exit_model
strategy: v22_with_exit_model
runner: src.components.runners.generic_fusion
components:
  features: leading_v2
  target:
    type: early_wave
    trend_method: dual_ma
    short_window: 5
    long_window: 20
    classes: 3
    forward_window: 8
    gain_threshold: 0.06
    loss_threshold: 0.03
  entry_model:
    type: lightgbm
    device: cpu
    extras: {}
  exit_model:
    enabled: true
    type: lightgbm
    forward_window: 15
    loss_threshold: 0.05
    extras: {}
split:
  method: walk_forward
  train_years: 4
  test_years: 1
  gap_days: 0
  first_test_year: 2023
  last_test_year: 2024
mods:
  a: true
  b: true
  c: false
  d: false
  e: true
  f: true
  g: true
  h: true
  i: true
  j: true
params:
  v22_mode: true
  v22_fast_exit_skip_strong: true
  v22_fast_exit_vol_confirm: true
  v22_fast_exit_threshold_hb: -0.07
  v22_fast_exit_threshold_std: -0.05
  v22_adaptive_hard_cap: true
  v22_hard_cap_mult_hb: 3.0
  v22_hard_cap_mult_std: 2.5
  v22_hard_cap_floor: 0.12
  v22_hard_cap_floor_hb: 0.15
fusion:
  entry:
    - name: v19_entry_cascade
  force_exit:
    - name: hard_stop_exit
    - name: v22_hard_cap
  active_exit:
    - name: v22_fast_exit
    - name: atr_stop_loss
    - name: peak_protect_dist
    - name: peak_protect_ema8_streak
    - name: ma_cross_hybrid_exit
    - name: adaptive_trailing
    - name: profit_lock
    - name: zombie_exit
  hold:
    - name: min_hold_protection
    - name: v19_signal_hold_guard
    - name: long_horizon_carry
