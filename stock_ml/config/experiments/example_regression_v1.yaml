name: regression_entry_v1
hypothesis: |
  Forward-return regression predicts 5-bar future return directly.
  Buy signals on positive predicted returns, sell on negative.
  This professional approach (de Prado, Two Sigma style) should outperform
  classification with simpler semantics and better sizing readiness.

strategy: entry_exit_regression
market: vn_stock
seed: 42

components:
  features: basic_v1
  target:
    type: forward_return_regression
    horizon: 5

  entry_model:
    type: lightgbm
    params:
      n_estimators: 300
      learning_rate: 0.05
      num_leaves: 31

  exit_model:
    type: none
    enabled: false

split:
  type: walk_forward_year
  train_years: 4
  test_years: 1
  gap_days: 25
  first_test_year: 2020
  last_test_year: 2025

engine:
  max_hold_bars: 20
  min_hold_bars: 1
  hard_stop_pct: -0.08
  costs:
    commission: 0.0015
    tax: 0.001
    slippage_model: fixed
    slippage: 0.001

signal_threshold: 0.0
