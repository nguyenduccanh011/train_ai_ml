base:
  strategy: v22
  runner: components.runners.run_v22
  signals:
    features: leading_v2
    target:
      type: early_wave
      forward_window: 8
      gain_threshold: 0.06
      loss_threshold: 0.03
    entry_model:
      type: random_forest
    exit_model:
      enabled: true
      type: lightgbm
      forward_window: 15
      loss_threshold: 0.05
  mods:
