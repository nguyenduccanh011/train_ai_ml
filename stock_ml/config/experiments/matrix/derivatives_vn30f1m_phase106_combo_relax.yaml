name_prefix: deriv_p106_combo
# Phase 106: Combine best target (e102g025l026) with relaxed cascade parameters
# Now that CatBoost generates more signals, cascade filters may be blocking some
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - catboost
  signals.target:
    - {label: e102g025l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.025, loss_threshold: 0.026}
  exit_model:
    - {label: x48l0485, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.0485}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    # Baseline
    - {label: s0, v19_min_entry_score: 0}
    # Relax entry_score threshold
    - {label: sm1, v19_min_entry_score: -1}
    - {label: sm2, v19_min_entry_score: -2}
    # Relax hot_ret5 gate
    - {label: ret5_relax, v19_min_entry_score: 0, v19_ret5_hot_threshold: 8.0}
    # Relax dp_floor
    - {label: dp_relax, v19_min_entry_score: 0, v19_dp_floor: 3.0}
    # Relax both
    - {label: both_relax, v19_ret5_hot_threshold: 8.0, v19_dp_floor: 3.0}
base:
  market: vn_derivatives
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
