name_prefix: deriv_p109_combo2
# Phase 109: Combine x72 exit (99 trades) with different entry targets
# x72 gave 99 trades but WR 82.8% vs baseline 89.8%
# Test if stricter entry target can recover WR while keeping 99+ trades
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - catboost
  signals.target:
    # Current best
    - {label: e102g015l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.015, loss_threshold: 0.026}
    # Slightly stricter (may filter bad entries)
    - {label: e102g020l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.020, loss_threshold: 0.026}
    - {label: e102g025l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.025, loss_threshold: 0.026}
    - {label: e102g032l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.032, loss_threshold: 0.026}
  exit_model:
    # Best baseline
    - {label: x48l0485, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.0485}
    # x72 variant that gave 99 trades
    - {label: x72l0485, enabled: true, type: lightgbm, forward_window: 72, loss_threshold: 0.0485}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    - {label: s0, v19_min_entry_score: 0}
base:
  market: vn_derivatives
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
