name_prefix: deriv_p120_1h_fw_gain_dp
# Phase 120: Forward-window + gain sweep on refined dp guards
# Goal: test whether fw=96/108 with dp014/dp015 can exceed current max pnl
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - catboost
  signals.target:
    - {label: e96g013l026, type: early_wave_v2, forward_window: 96, gain_threshold: 0.013, loss_threshold: 0.026}
    - {label: e96g014l026, type: early_wave_v2, forward_window: 96, gain_threshold: 0.014, loss_threshold: 0.026}
    - {label: e96g015l026, type: early_wave_v2, forward_window: 96, gain_threshold: 0.015, loss_threshold: 0.026}
    - {label: e102g014l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.014, loss_threshold: 0.026}
    - {label: e102g015l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.015, loss_threshold: 0.026}
    - {label: e102g016l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.016, loss_threshold: 0.026}
    - {label: e108g014l026, type: early_wave_v2, forward_window: 108, gain_threshold: 0.014, loss_threshold: 0.026}
    - {label: e108g015l026, type: early_wave_v2, forward_window: 108, gain_threshold: 0.015, loss_threshold: 0.026}
    - {label: e108g016l026, type: early_wave_v2, forward_window: 108, gain_threshold: 0.016, loss_threshold: 0.026}
  exit_model:
    - {label: x48l0485, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.0485}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    - {label: dp014_bs1, v19_min_entry_score: 1, patch_relax_prev_pred_strong: true, patch_relax_prev_pred_min_score: 2, patch_relax_dp_floor_strong: true, patch_relax_price_proximity_strong: true, patch_relax_price_proximity_min_score: 3, patch_relax_price_proximity_moderate: true, patch_relax_price_proximity_moderate_min_score: 4, patch_relax_price_proximity_min_dp: 0.014, patch_relax_price_proximity_moderate_min_bs: 1}
    - {label: dp015_bs1, v19_min_entry_score: 1, patch_relax_prev_pred_strong: true, patch_relax_prev_pred_min_score: 2, patch_relax_dp_floor_strong: true, patch_relax_price_proximity_strong: true, patch_relax_price_proximity_min_score: 3, patch_relax_price_proximity_moderate: true, patch_relax_price_proximity_moderate_min_score: 4, patch_relax_price_proximity_min_dp: 0.015, patch_relax_price_proximity_moderate_min_bs: 1}
base:
  market: vn_derivatives
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
