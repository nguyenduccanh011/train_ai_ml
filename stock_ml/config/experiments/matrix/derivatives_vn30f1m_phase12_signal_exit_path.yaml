name_prefix: deriv_p12_sigpath
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    - {label: e75g325l1625, type: early_wave_v2, forward_window: 75, gain_threshold: 0.0325, loss_threshold: 0.01625}
  exit_model:
    - {label: x40l38, enabled: true, type: lightgbm, forward_window: 40, loss_threshold: 0.038}
    - {label: x45l38, enabled: true, type: lightgbm, forward_window: 45, loss_threshold: 0.038}
  fusion:
    - label: base
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: peak_protect_dist
      hold: []
    - label: cap
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: peak_protect_dist
        - name: peak_protect_ema8_streak
        - name: adaptive_trailing
        - name: profit_lock
      hold: []
  params:
    - {label: se_on_ar0_off, signal_exit_enabled: true, patch_active_exit_on_raw0: false}
    - {label: se_on_ar0_on, signal_exit_enabled: true, patch_active_exit_on_raw0: true}
    - {label: se_off_ar0_off, signal_exit_enabled: false, patch_active_exit_on_raw0: false}
    - {label: se_off_ar0_on, signal_exit_enabled: false, patch_active_exit_on_raw0: true}
base:
  market: vn_derivatives
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
