name_prefix: deriv_p57_30mopt
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    # 30m micro-wave: 80-120 bars = 40-60 giờ = 5-7.5 ngày
    - {label: e80g025l013, type: early_wave_v2, forward_window: 80, gain_threshold: 0.025, loss_threshold: 0.013}
    - {label: e100g030l015, type: early_wave_v2, forward_window: 100, gain_threshold: 0.030, loss_threshold: 0.015}
    - {label: e100g025l013, type: early_wave_v2, forward_window: 100, gain_threshold: 0.025, loss_threshold: 0.013}
    - {label: e120g030l015, type: early_wave_v2, forward_window: 120, gain_threshold: 0.030, loss_threshold: 0.015}
  exit_model:
    # 30m exit: 48-60 bars = 24-30 giờ = 3-4 ngày
    - {label: x48l035, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.035}
    - {label: x60l035, enabled: true, type: lightgbm, forward_window: 60, loss_threshold: 0.035}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: peak_protect_dist
      hold: []
  params:
    - {label: s0, v19_min_entry_score: 0}
    - {label: s1, v19_min_entry_score: 1}
base:
  market: vn_derivatives_30m
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
