name_prefix: deriv_p58_30mmic
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    # 30m micro: 30-60 bars = 15-30 giờ = 2-4 ngày
    - {label: e30g015l008, type: early_wave_v2, forward_window: 30, gain_threshold: 0.015, loss_threshold: 0.008}
    - {label: e40g018l009, type: early_wave_v2, forward_window: 40, gain_threshold: 0.018, loss_threshold: 0.009}
    - {label: e50g020l010, type: early_wave_v2, forward_window: 50, gain_threshold: 0.020, loss_threshold: 0.010}
    - {label: e60g022l011, type: early_wave_v2, forward_window: 60, gain_threshold: 0.022, loss_threshold: 0.011}
  exit_model:
    # Exit fw ngắn hơn để match micro signal
    - {label: x24l025, enabled: true, type: lightgbm, forward_window: 24, loss_threshold: 0.025}
    - {label: x36l028, enabled: true, type: lightgbm, forward_window: 36, loss_threshold: 0.028}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    - {label: s0, v19_min_entry_score: 0}
base:
  market: vn_derivatives_30m
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
