name_prefix: deriv_p60_15mmic
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    # 15m micro: fw=12-30 bars = 3-7.5 giờ = <1 ngày
    - {label: e12g008l004, type: early_wave_v2, forward_window: 12, gain_threshold: 0.008, loss_threshold: 0.004}
    - {label: e20g010l005, type: early_wave_v2, forward_window: 20, gain_threshold: 0.010, loss_threshold: 0.005}
    - {label: e24g012l006, type: early_wave_v2, forward_window: 24, gain_threshold: 0.012, loss_threshold: 0.006}
    - {label: e30g013l007, type: early_wave_v2, forward_window: 30, gain_threshold: 0.013, loss_threshold: 0.007}
  exit_model:
    - {label: x12l018, enabled: true, type: lightgbm, forward_window: 12, loss_threshold: 0.018}
    - {label: x20l020, enabled: true, type: lightgbm, forward_window: 20, loss_threshold: 0.020}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    - {label: s0, v19_min_entry_score: 0}
base:
  market: vn_derivatives_15m
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
