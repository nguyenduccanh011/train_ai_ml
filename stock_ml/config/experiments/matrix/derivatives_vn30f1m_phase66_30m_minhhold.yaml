name_prefix: deriv_p66_30mmh
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    # Top 3 configs từ phase 59 (best 30m cho đến nay)
    - {label: e12g010l005, type: early_wave_v2, forward_window: 12, gain_threshold: 0.010, loss_threshold: 0.005}
    - {label: e16g012l006, type: early_wave_v2, forward_window: 16, gain_threshold: 0.012, loss_threshold: 0.006}
  exit_model:
    - {label: x12l020, enabled: true, type: lightgbm, forward_window: 12, loss_threshold: 0.020}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    # Baseline: min_hold=3 bars (1.5h)
    - {label: mh3, v19_min_entry_score: 0, exit_model_min_hold: 3}
    # min_hold=6 bars (3h)
    - {label: mh6, v19_min_entry_score: 0, exit_model_min_hold: 6}
    # min_hold=8 bars (4h)
    - {label: mh8, v19_min_entry_score: 0, exit_model_min_hold: 8}
    # min_hold=12 bars (6h)
    - {label: mh12, v19_min_entry_score: 0, exit_model_min_hold: 12}
    # min_hold=16 bars (8h)
    - {label: mh16, v19_min_entry_score: 0, exit_model_min_hold: 16}
base:
  market: vn_derivatives_30m
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
