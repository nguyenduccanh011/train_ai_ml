name_prefix: deriv_p77_30mv22
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    - {label: e10g008l003, type: early_wave_v2, forward_window: 10, gain_threshold: 0.008, loss_threshold: 0.003}
  exit_model:
    - {label: x48l023, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.023}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    # Baseline (current champion)
    - label: s0_base
      v19_min_entry_score: 0
      v22_fast_exit_threshold_hb: -0.07
      v22_fast_exit_threshold_std: -0.05
      v22_hard_cap_mult_hb: 3.0
      v22_hard_cap_mult_std: 2.5
      v22_hard_cap_floor: 0.12
      v22_hard_cap_floor_hb: 0.15
    # Tighter fast exit — cắt lỗ nhanh hơn khi HB
    - label: s1_tight_fe
      v19_min_entry_score: 0
      v22_fast_exit_threshold_hb: -0.05
      v22_fast_exit_threshold_std: -0.04
      v22_hard_cap_mult_hb: 3.0
      v22_hard_cap_mult_std: 2.5
      v22_hard_cap_floor: 0.12
      v22_hard_cap_floor_hb: 0.15
    # Looser fast exit — cho nhiều room hơn
    - label: s2_loose_fe
      v19_min_entry_score: 0
      v22_fast_exit_threshold_hb: -0.10
      v22_fast_exit_threshold_std: -0.07
      v22_hard_cap_mult_hb: 3.0
      v22_hard_cap_mult_std: 2.5
      v22_hard_cap_floor: 0.12
      v22_hard_cap_floor_hb: 0.15
    # Tighter hard cap — bảo vệ lợi nhuận sớm hơn
    - label: s3_tight_hc
      v19_min_entry_score: 0
      v22_fast_exit_threshold_hb: -0.07
      v22_fast_exit_threshold_std: -0.05
      v22_hard_cap_mult_hb: 2.5
      v22_hard_cap_mult_std: 2.0
      v22_hard_cap_floor: 0.10
      v22_hard_cap_floor_hb: 0.12
    # Looser hard cap — để position chạy dài hơn
    - label: s4_loose_hc
      v19_min_entry_score: 0
      v22_fast_exit_threshold_hb: -0.07
      v22_fast_exit_threshold_std: -0.05
      v22_hard_cap_mult_hb: 4.0
      v22_hard_cap_mult_std: 3.5
      v22_hard_cap_floor: 0.15
      v22_hard_cap_floor_hb: 0.18
    # Disable fast exit completely
    - label: s5_no_fe
      v19_min_entry_score: 0
      v22_fast_exit_skip_strong: false
      v22_fast_exit_vol_confirm: false
      v22_fast_exit_threshold_hb: -0.07
      v22_fast_exit_threshold_std: -0.05
      v22_hard_cap_mult_hb: 3.0
      v22_hard_cap_mult_std: 2.5
      v22_hard_cap_floor: 0.12
      v22_hard_cap_floor_hb: 0.15
    # Disable adaptive hard cap
    - label: s6_no_ahc
      v19_min_entry_score: 0
      v22_fast_exit_threshold_hb: -0.07
      v22_fast_exit_threshold_std: -0.05
      v22_adaptive_hard_cap: false
      v22_hard_cap_mult_hb: 3.0
      v22_hard_cap_mult_std: 2.5
      v22_hard_cap_floor: 0.12
      v22_hard_cap_floor_hb: 0.15
