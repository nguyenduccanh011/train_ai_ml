name_prefix: deriv_p78_30met
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    - {label: e10g008l003, type: early_wave_v2, forward_window: 10, gain_threshold: 0.008, loss_threshold: 0.003}
    - {label: e16g012l006, type: early_wave_v2, forward_window: 16, gain_threshold: 0.012, loss_threshold: 0.006}
  exit_model:
    - {label: x48l023, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.023}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    # Baseline (no threshold)
    - {label: s0, v19_min_entry_score: 0}
    # Light filter
    - {label: s01, v19_min_entry_score: 0.1}
    - {label: s02, v19_min_entry_score: 0.2}
    # Medium filter
    - {label: s03, v19_min_entry_score: 0.3}
    - {label: s04, v19_min_entry_score: 0.4}
    # Aggressive filter
    - {label: s05, v19_min_entry_score: 0.5}
    - {label: s06, v19_min_entry_score: 0.6}
base:
  market: vn_derivatives_30m
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
