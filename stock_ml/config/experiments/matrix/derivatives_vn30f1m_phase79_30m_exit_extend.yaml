name_prefix: deriv_p79_30mex
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - random_forest
  signals.target:
    - {label: e10g008l003, type: early_wave_v2, forward_window: 10, gain_threshold: 0.008, loss_threshold: 0.003}
    - {label: e8g007l003, type: early_wave_v2, forward_window: 8, gain_threshold: 0.007, loss_threshold: 0.003}
  exit_model:
    # Extend beyond current best x48l023 to see if longer fw helps
    - {label: x48l023, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.023}
    - {label: x56l023, enabled: true, type: lightgbm, forward_window: 56, loss_threshold: 0.023}
    - {label: x60l023, enabled: true, type: lightgbm, forward_window: 60, loss_threshold: 0.023}
    - {label: x72l023, enabled: true, type: lightgbm, forward_window: 72, loss_threshold: 0.023}
    # Also try lower loss threshold with longer fw
    - {label: x60l020, enabled: true, type: lightgbm, forward_window: 60, loss_threshold: 0.020}
    - {label: x72l020, enabled: true, type: lightgbm, forward_window: 72, loss_threshold: 0.020}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    - {label: s0, v19_min_entry_score: 0}
base:
  market: vn_derivatives_30m
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
