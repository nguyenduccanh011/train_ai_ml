name_prefix: deriv_p95_30m_hifeathold
axes:
  signals.features:
    - volatility
    - all_features
    - momentum
  signals.entry_model.type:
    - xgboost
  signals.target:
    - {label: e69g007l024, type: early_wave_v2, forward_window: 69, gain_threshold: 0.007, loss_threshold: 0.024}
    - {label: e70g007l024, type: early_wave_v2, forward_window: 70, gain_threshold: 0.007, loss_threshold: 0.024}
    - {label: e71g007l024, type: early_wave_v2, forward_window: 71, gain_threshold: 0.007, loss_threshold: 0.024}
  exit_model:
    - {label: x35l021, enabled: true, type: lightgbm, forward_window: 35, loss_threshold: 0.021}
    - {label: x36l021, enabled: true, type: lightgbm, forward_window: 36, loss_threshold: 0.021}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    - {label: h3s0, v19_min_entry_score: 0, exit_model_min_hold: 3}
    - {label: h4s0, v19_min_entry_score: 0, exit_model_min_hold: 4}
    - {label: h5s0, v19_min_entry_score: 0, exit_model_min_hold: 5}
    - {label: h4s1, v19_min_entry_score: 1, exit_model_min_hold: 4}
    - {label: h4s2, v19_min_entry_score: 2, exit_model_min_hold: 4}
base:
  market: vn_derivatives_30m
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
