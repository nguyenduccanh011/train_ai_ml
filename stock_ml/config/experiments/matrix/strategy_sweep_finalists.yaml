name_prefix: strategy_sweep_finalists

axes:
  signals:
    - label: leading_v2_random_forest_lightgbm_exit
      features: leading_v2
      entry_model: {type: random_forest}
      exit_model: {enabled: true, type: lightgbm, forward_window: 15, loss_threshold: 0.05}
    - label: leading_v2_gru_lightgbm_exit
      features: leading_v2
      entry_model: {type: gru}
      exit_model: {enabled: true, type: lightgbm, forward_window: 15, loss_threshold: 0.05}
    - label: leading_v4_random_forest_lightgbm_exit
      features: leading_v4
      entry_model: {type: random_forest}
      exit_model: {enabled: true, type: lightgbm, forward_window: 15, loss_threshold: 0.05}
  strategy: [v22, v22_with_exit_model, v32, v34, v35b, v37a, v37d, v39d, v42_a]

base:
  signals:
    target:
      type: early_wave
  split:
    first_test_year: 2020
    last_test_year: 2025
