name_prefix: v22_exit_ablation_round15
axes:
  signals.entry_model.type:
    - random_forest
    - lightgbm
    - xgboost
    - catboost
  fusion:
    - label: peak_ema_no_hold
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: peak_protect_dist
        - name: peak_protect_ema8_streak
      hold: []
    - label: peak_dist_only
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: peak_protect_dist
      hold: []
base:
  strategy: v22
  runner: components.runners.run_v22
  signals:
    features: leading_v2
    target:
      type: early_wave
      forward_window: 13
      gain_threshold: 0.055
      loss_threshold: 0.0275
    exit_model:
      enabled: true
      type: lightgbm
      forward_window: 18
      loss_threshold: 0.035
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
