name: test_rule_v1
hypothesis: |
  Test pure rule-based entry/exit without ML.
  Entry: macd_line > 0 AND sma_20_ratio > 0
  Exit: macd_line < 0 AND sma_20_ratio < 0
strategy: rule_only
market: vn_stock
seed: 42

components:
  features: leading_v2
  target:
    type: trend_regime
    trend_method: dual_ma
    short_window: 10
    long_window: 40
    classes: 3

  entry_model:
    type: rule
    params:
      conditions:
        - {feature: macd_line, op: ">", value: 0}
        - {feature: sma_20_ratio, op: ">", value: 0}
      logic: AND
      score_feature: macd_line

  exit_model:
    type: rule
    enabled: true
    params:
      conditions:
        - {feature: macd_line, op: "<", value: 0}
        - {feature: sma_20_ratio, op: "<", value: 0}
      logic: AND
      score_feature: macd_line

split:
  type: walk_forward_year
  train_years: 4
  test_years: 1
  gap_days: 25
  first_test_year: 2020
  last_test_year: 2024

engine:
  max_hold_bars: 20
  min_hold_bars: 1
  hard_stop_pct: -0.08
  costs:
    commission: 0.0015
    tax: 0.001
    slippage: 0.0

signal_threshold: 0.0
validation:
  n_seeds: 1
strict_audit: true
