fairness_dims:
  - market_family
  - symbols
  - window
  - cost_profile
  - target

market_families:
  vn_derivatives:
    label: VN Derivatives
    aligned_backtest:
      first_test_year: 2020
      last_test_year: 2025
      require_same_window: true
    members:
      - market: vn_derivatives
        timeframe: 1H
      - market: vn_derivatives_30m
