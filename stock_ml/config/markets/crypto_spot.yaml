name: crypto_spot
market_type: equity_spot

data:
  data_dir: "../portable_data/crypto_spot_dataset"
  schema: ohlcv_daily
  default_timeframe: "1D"
  benchmark_symbol: null
  timestamp_column: timestamp
  timezone: UTC
  required_columns: [open, high, low, close, volume]
  optional_columns: []
  volume_unit: base_asset

execution:
  instrument_type: spot
  pnl_mode: equity_spot
  commission: 0.001
  tax: 0.0
  slippage: 0.001
  initial_capital: 10000
  currency: USDT
  contract_multiplier: 1
  funding_rate_column: null
  margin_mode: null
  leverage: 1
  maintenance_margin_rate: 0.0
  liquidation_fee: 0.0
  roll_cost_rate: 0.0
  expiry_date_column: null

symbols:
  default_list: [BTCUSDT, ETHUSDT, BNBUSDT, SOLUSDT, ADAUSDT]
  groups:
    BTCUSDT: large_cap
    ETHUSDT: large_cap
    BNBUSDT: mid_cap
    SOLUSDT: mid_cap
    ADAUSDT: mid_cap
  default_group: large_cap

strategy_overrides: {}

features:
  enabled_blocks: null

models:
  default_stack: null

target:
  type: forward_return
  horizon: 5
  unit: bars
