pipeline:
  data_dir: ../portable_data/vn_stock_ai_dataset_cleaned
  feature_set: leading_v2
  train_years: 4
  test_years: 1
  first_test_year: 2020
  last_test_year: 2025
  min_rows: 2000
  model_type: lightgbm
  symbols:
    mode: auto
    min_rows: 2000
    explicit_list: ""
  target:
    type: trend_regime
    trend_method: dual_ma
    short_window: 5
    long_window: 20
    classes: 3
  commission: 0.0015
  tax: 0.001
scoring:
