pipeline:
  data_dir: ../portable_data/vn_stock_ai_dataset_cleaned
  feature_set: leading_v2
  train_years: 4
  test_years: 1
  first_test_year: 2020
  last_test_year: 2025
  min_rows: 2000
  model_type: lightgbm
  symbols:
    mode: explicit
    min_rows: 2000
    explicit_list: ACB,AAS,AAV,ACV,BCG,BCM,BID,BSR,BVH,CTG,DCM,DGC,DIG,DPM,EIB,FPT,FRT,GAS,GEX,GMD,HCM,HDB,HDG,HPG,HSG,KBC,KDH,LPB,MBB,MSN,MWG,NKG,NLG,NT2,NVL,OCB,PC1,PDR,PLX,PNJ,POW,PVD,PVS,REE,SAB,SBT,SHB,SSI,STB,TCB,TPB,VCB,VCI,VDS,VHM,VIC,VJC,VND,VNM,VPB,VTP
  target:
    type: trend_regime
    trend_method: dual_ma
    short_window: 5
    long_window: 20
    classes: 3
  commission: 0.0015
  tax: 0.001
scoring:
  weights:
    total_pnl: 0.45
    profit_factor: 0.25
    mdd_per_symbol: 0.2
    sharpe: 0.1
visualization:
  output_dir: visualization
  chart_library: lightweight-charts
  exit_reason_abbreviations:
    stop_loss: SL
    trailing_stop: TS
    hard_stop: HS
    zombie_exit: ZE
    hybrid_exit: HX
    profit_lock: PL
    profit_floor: PF
    peak_protect_dist: PP
    peak_protect_ema: PE
    fast_loss_cut: FC
    fast_exit_loss: FE
    signal_hard_cap: HC
    signal: ''
    end: END
    rule_sell: RS
    v32_hap_preempt: HP
    v32_weak_oversold: WO
    v31_hap_exit: HAP
    v28_early_loss_cut: EL
