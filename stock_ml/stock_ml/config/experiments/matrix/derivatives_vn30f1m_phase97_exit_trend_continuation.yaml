name_prefix: deriv_p97_tc
axes:
  signals.features:
    - leading
  signals.entry_model.type:
    - catboost
  signals.target:
    - {label: e102g038l026, type: early_wave_v2, forward_window: 102, gain_threshold: 0.038, loss_threshold: 0.026}
  exit_model:
    - {label: x48l0485, enabled: true, type: lightgbm, forward_window: 48, loss_threshold: 0.0485}
  fusion:
    - label: dist
      entry:
        - name: v19_entry_cascade
      force_exit:
        - name: hard_stop_exit
      active_exit:
        - name: exit_model
        - name: peak_protect_dist
      hold: []
  params:
    # Baseline (same as phase90 top1)
    - {label: baseline, v19_min_entry_score: 0}

    # Phase A1: Trend continuation - min_hold variations
    - {label: tc_mh8, v19_min_entry_score: 0, exit_model_min_hold: 8}
    - {label: tc_mh10, v19_min_entry_score: 0, exit_model_min_hold: 10}
    - {label: tc_mh12, v19_min_entry_score: 0, exit_model_min_hold: 12}
    - {label: tc_mh15, v19_min_entry_score: 0, exit_model_min_hold: 15}

    # Phase A2: Adaptive min_hold by trend (requires code changes)
    # Will implement in separate phase after baseline comparison

base:
  market: vn_derivatives
  strategy: v22
  runner: components.runners.run_v22
  mods:
    a: true
    b: true
    c: false
    d: false
    e: true
    f: true
    g: true
    h: true
    i: true
    j: true
  params:
    signal_exit_enabled: false
    patch_active_exit_on_raw0: true
    v22_mode: true
    v22_fast_exit_skip_strong: true
    v22_fast_exit_vol_confirm: true
    v22_fast_exit_threshold_hb: -0.07
    v22_fast_exit_threshold_std: -0.05
    v22_adaptive_hard_cap: true
    v22_hard_cap_mult_hb: 3.0
    v22_hard_cap_mult_std: 2.5
    v22_hard_cap_floor: 0.12
    v22_hard_cap_floor_hb: 0.15
  split:
    first_test_year: 2020
    last_test_year: 2025
