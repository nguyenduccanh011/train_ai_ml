name: vn_derivatives_15m
market_type: derivatives
data:
  data_dir: ../portable_data/derivatives_ai_dataset
  schema: ohlcv_futures_1h
  default_timeframe: 15m
  benchmark_symbol: null
  timestamp_column: timestamp
  timezone: Asia/Ho_Chi_Minh
  required_columns:
    - open
    - high
    - low
    - close
    - volume
  optional_columns:
    - exchange
    - asset_type
    - data_provider
    - timeframe
    - expiry_date
    - contract_code
    - open_interest
  volume_unit: contracts
execution:
  instrument_type: futures
  currency: VND
  initial_capital: 100000000
  commission: 0.0004
  contract_multiplier: 100000
  leverage: 1
  pnl_mode: futures_contract
  expiry_date_column: expiry_date
  funding_rate_column: null
  borrow_rate_column: null
  next_volume_column: null
  next_oi_column: null
  margin_mode: null
  maintenance_margin_rate: 0.0
  liquidation_fee: 0.0
symbols:
  default_list:
    - VN30F1M
    - VN30F2M
  default_group: front_month
  groups:
    VN30F1M: front_month
    VN30F2M: next_month
strategy_overrides: {}
features:
  default_set: leading
models:
  entry:
    default_type: random_forest
  exit:
    default_type: lightgbm
target:
  default_type: early_wave_v2
