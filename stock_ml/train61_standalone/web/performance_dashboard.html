<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Test Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f131a;
      color: #d1d4dc;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #FFD700; margin-bottom: 20px; }
    .section {
      background: #131722;
      border: 1px solid #252b36;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section h2 { color: #00E5FF; margin-bottom: 15px; font-size: 18px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .metric {
      background: #1b2130;
      border-radius: 6px;
      padding: 15px;
      border: 1px solid #30384a;
    }
    .metric-label { color: #8f9bad; font-size: 12px; margin-bottom: 5px; }
    .metric-value { color: #fff; font-size: 24px; font-weight: 700; }
    .metric-sub { color: #8f9bad; font-size: 11px; margin-top: 5px; }
    .good { color: #4caf50; }
    .warn { color: #ffca28; }
    .bad { color: #f44336; }
    button {
      background: #00E5FF;
      color: #0f131a;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
    }
    button:hover { background: #00d4ee; }
    button.danger { background: #f44336; color: #fff; }
    button.danger:hover { background: #e53935; }
    .controls { margin-bottom: 20px; }
    .log {
      background: #0a0e14;
      border: 1px solid #252b36;
      border-radius: 6px;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .status.running { background: #ffca28; color: #000; }
    .status.ready { background: #4caf50; color: #fff; }
    .status.error { background: #f44336; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Train61 Performance Dashboard</h1>

    <div class="controls">
      <button onclick="refreshStats()">🔄 Refresh Stats</button>
      <button onclick="clearCache()" class="danger">🗑️ Clear Cache</button>
      <span id="serverStatus" class="status">Checking...</span>
    </div>

    <div class="section">
      <h2>📊 Cache Statistics</h2>
      <div class="grid" id="cacheStats">
        <div class="metric"><div class="metric-label">Loading...</div></div>
      </div>
    </div>

    <div class="section">
      <h2>🔧 Job Statistics</h2>
      <div class="grid" id="jobStats">
        <div class="metric"><div class="metric-label">Loading...</div></div>
      </div>
    </div>

    <div class="section">
      <h2>📝 Activity Log</h2>
      <div class="log" id="activityLog">Waiting for data...</div>
    </div>
  </div>

  <script>
    const BASE_URL = 'http://127.0.0.1:5012';
    let logMessages = [];

    function log(message) {
      const timestamp = new Date().toLocaleTimeString();
      logMessages.unshift(`[${timestamp}] ${message}`);
      if (logMessages.length > 50) logMessages.pop();
      document.getElementById('activityLog').textContent = logMessages.join('\n');
    }

    async function checkServer() {
      try {
        const resp = await fetch(BASE_URL);
        if (resp.ok) {
          document.getElementById('serverStatus').textContent = '✅ Server Running';
          document.getElementById('serverStatus').className = 'status ready';
          return true;
        }
      } catch (err) {
        document.getElementById('serverStatus').textContent = '❌ Server Offline';
        document.getElementById('serverStatus').className = 'status error';
        log('Server is offline');
        return false;
      }
    }

    async function refreshStats() {
      if (!await checkServer()) return;

      try {
        const resp = await fetch(`${BASE_URL}/api/cache-stats`);
        const data = await resp.json();

        const cacheHtml = data.caches.map(cache => {
          const hitRate = cache.hit_rate_pct;
          const rateClass = hitRate >= 80 ? 'good' : hitRate >= 50 ? 'warn' : 'bad';
          return `
            <div class="metric">
              <div class="metric-label">${cache.name}</div>
              <div class="metric-value">${cache.size}/${cache.max_size}</div>
              <div class="metric-sub">
                Hit rate: <span class="${rateClass}">${hitRate}%</span><br>
                Hits: ${cache.hits}, Misses: ${cache.misses}<br>
                Evictions: ${cache.evictions}
              </div>
            </div>
          `;
        }).join('');
        document.getElementById('cacheStats').innerHTML = cacheHtml;

        const jobHtml = `
          <div class="metric">
            <div class="metric-label">Active Jobs</div>
            <div class="metric-value ${data.active_jobs > 0 ? 'warn' : 'good'}">${data.active_jobs}</div>
            <div class="metric-sub">Currently running</div>
          </div>
          <div class="metric">
            <div class="metric-label">Completed Jobs</div>
            <div class="metric-value good">${data.completed_jobs}</div>
            <div class="metric-sub">Successfully finished</div>
          </div>
          <div class="metric">
            <div class="metric-label">Failed Jobs</div>
            <div class="metric-value ${data.failed_jobs > 0 ? 'bad' : 'good'}">${data.failed_jobs}</div>
            <div class="metric-sub">Errors encountered</div>
          </div>
          <div class="metric">
            <div class="metric-label">Queue Size</div>
            <div class="metric-value">${data.executor_queue_size}</div>
            <div class="metric-sub">Waiting in queue</div>
          </div>
          <div class="metric">
            <div class="metric-label">Symbol List Cache</div>
            <div class="metric-value">${data.symbol_list_cache_size}</div>
            <div class="metric-sub">Cached model lists</div>
          </div>
        `;
        document.getElementById('jobStats').innerHTML = jobHtml;

        log('Stats refreshed successfully');
      } catch (err) {
        log(`Error fetching stats: ${err.message}`);
      }
    }

    async function clearCache() {
      if (!confirm('Clear all caches? This will reset performance metrics.')) return;

      try {
        const resp = await fetch(`${BASE_URL}/api/cache-clear`, { method: 'POST' });
        const data = await resp.json();
        log(`Cache cleared: ${data.message}`);
        setTimeout(refreshStats, 500);
      } catch (err) {
        log(`Error clearing cache: ${err.message}`);
      }
    }

    setInterval(refreshStats, 5000);

    checkServer().then(ok => {
      if (ok) {
        refreshStats();
        log('Dashboard initialized');
      }
    });
  </script>
</body>
</html>
