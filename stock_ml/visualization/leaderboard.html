<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backtest Leaderboard</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #131722;
      color: #d1d4dc;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1e222d;
      border-bottom: 1px solid #2B2B43;
      padding: 16px 20px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      color: #fff;
      font-weight: 600;
    }

    .data-path {
      color: #787b86;
      font-size: 12px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 10px;
      align-items: center;
    }

    .toggle-group {
      display: flex;
      background: #2a2e39;
      border: 1px solid #444;
      border-radius: 6px;
      overflow: hidden;
    }

    .toggle-btn {
      flex: 1;
      border: 0;
      background: transparent;
      color: #d1d4dc;
      padding: 8px 12px;
      cursor: pointer;
    }

    .toggle-btn.active {
      background: #2962ff;
      color: #fff;
    }

    input, select {
      width: 100%;
      background: #2a2e39;
      color: #d1d4dc;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 10px;
      outline: none;
    }

    input:focus, select:focus { border-color: #2962ff; }

    label.checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #d1d4dc;
      white-space: nowrap;
    }

    label.checkbox input { width: auto; }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
      padding: 14px 20px;
      background: #131722;
      border-bottom: 1px solid #2B2B43;
    }

    .stat-card {
      background: #1e222d;
      border: 1px solid #2B2B43;
      border-radius: 8px;
      padding: 12px;
    }

    .stat-title {
      color: #787b86;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
    }

    .table-wrap {
      height: calc(100vh - 178px);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1500px;
      font-size: 13px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #1e222d;
      color: #d1d4dc;
      border-bottom: 1px solid #2B2B43;
      padding: 10px 8px;
      text-align: left;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    thead th:hover { color: #fff; }

    tbody td {
      border-bottom: 1px solid #2B2B43;
      padding: 9px 8px;
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody tr:hover { background: #1b2030; }
    tbody tr.superseded { opacity: 0.45; font-style: italic; }
    tbody tr.top-1 { background: rgba(255, 215, 0, 0.08); }
    tbody tr.top-3:not(.top-1) { background: rgba(192, 192, 192, 0.06); }
    tbody tr.top-10:not(.top-1):not(.top-3) { background: rgba(205, 127, 50, 0.05); }

    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .positive { color: #26a69a; }
    .negative { color: #ef5350; }
    .muted { color: #787b86; }

    .run-name {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      color: #fff;
      background: #2a2e39;
      border: 1px solid #444;
    }

    .badge.gold { color: #131722; background: #FFD700; border-color: #FFD700; }
    .badge.silver { color: #131722; background: #C0C0C0; border-color: #C0C0C0; }
    .badge.bronze { color: #131722; background: #CD7F32; border-color: #CD7F32; }
    .badge.warn { background: #704d00; border-color: #9a6a00; }
    .badge.baseline { background: #1d3f7a; border-color: #2962ff; }
    .badge.fair-ok { background: #144f47; border-color: #26a69a; }
    .badge.exit-on { background: #144f47; border-color: #26a69a; }
    .badge.exit-off { background: #4f1c1c; border-color: #ef5350; }

    .empty, .error {
      padding: 28px;
      text-align: center;
      color: #787b86;
    }

    .error { color: #ef5350; }

    @media (max-width: 1100px) {
      .controls { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .stats-bar { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .table-wrap { height: calc(100vh - 270px); }
      .title-row { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="title-row">
      <h1>Backtest Leaderboard</h1>
      <div class="data-path">../results/leaderboard/leaderboard.json</div>
    </div>
    <div class="controls">
      <div class="toggle-group" aria-label="Score mode">
        <button class="toggle-btn active" id="globalMode" type="button">Global</button>
        <button class="toggle-btn" id="fairMode" type="button">Fair</button>
      </div>
      <input id="searchInput" type="search" placeholder="Search run, bundle, model...">
      <select id="bundleFilter"><option value="">All bundles</option></select>
      <select id="strategyFilter"><option value="">All strategies</option></select>
      <select id="featureFilter"><option value="">All feature sets</option></select>
      <select id="modelFilter"><option value="">All entry models</option></select>
      <select id="yearFilter"><option value="">All windows</option></select>
      <label class="checkbox"><input id="showSuperseded" type="checkbox"> Show superseded</label>
    </div>
  </header>

  <section class="stats-bar">
    <div class="stat-card"><div class="stat-title">Visible rows</div><div class="stat-value" id="visibleCount">—</div></div>
    <div class="stat-card"><div class="stat-title">Active rows</div><div class="stat-value" id="activeCount">—</div></div>
    <div class="stat-card"><div class="stat-title">Fairness groups</div><div class="stat-value" id="groupCount">—</div></div>
    <div class="stat-card"><div class="stat-title">Current mode</div><div class="stat-value" id="modeLabel">Global</div></div>
  </section>

  <main class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="rank">Rank</th>
          <th data-sort="composite_score" class="num">Score</th>
          <th data-sort="run_name">Run</th>
          <th data-sort="bundle">Bundle</th>
          <th data-sort="strategy">Strategy</th>
          <th data-sort="feature_set">Feature</th>
          <th data-sort="entry_model">Entry</th>
          <th data-sort="exit_model_type">Exit</th>
          <th data-sort="trades" class="num">Trades</th>
          <th data-sort="wr" class="num">WR</th>
          <th data-sort="avg_pnl" class="num">Avg PnL</th>
          <th data-sort="pf" class="num">PF</th>
          <th data-sort="sharpe" class="num">Sharpe</th>
          <th data-sort="max_drawdown" class="num">MDD</th>
          <th data-sort="yearly_consistency" class="num">Yearly</th>
          <th data-sort="n_symbols" class="num">Symbols</th>
          <th data-sort="first_test_year">Window</th>
          <th data-sort="warnings">Warnings</th>
          <th data-sort="fairness_group_key">Fair group</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody">
        <tr><td colspan="19" class="empty">Loading leaderboard...</td></tr>
      </tbody>
    </table>
  </main>

  <script src="./leaderboard.js"></script>
</body>
</html>
