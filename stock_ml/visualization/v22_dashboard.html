<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V22 Signal Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #131722; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  button, input, select { font: inherit; }

  .header {
    padding: 12px 20px;
    background: #1e222d;
    border-bottom: 1px solid #2B2B43;
    display: grid;
    gap: 10px;
  }
  .top-row {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto;
    align-items: center;
    gap: 16px;
  }
  .title h1 { font-size: 17px; color: #fff; letter-spacing: 0.2px; }
  .title p { font-size: 11px; color: #888; margin-top: 2px; }
  .nav-link {
    color: #66BB6A;
    text-decoration: none;
    border: 1px solid #345c36;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
  }
  .nav-link:hover { background: #66BB6A22; }

  .controls {
    display: grid;
    grid-template-columns: minmax(240px, 420px) auto auto auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .symbol-selector { position: relative; }
  .symbol-search-input, .sort-controls select {
    background: #2a2e39;
    color: #d1d4dc;
    border: 1px solid #444;
    padding: 7px 10px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
  }
  .symbol-search-input { width: 100%; }
  .symbol-search-input:focus, .sort-controls select:focus { border-color: #66BB6A; }
  .symbol-dropdown {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    min-width: 100%;
    width: max-content;
    max-width: 560px;
    max-height: 420px;
    overflow-y: auto;
    background: #2a2e39;
    border: 1px solid #444;
    border-radius: 4px;
    display: none;
    z-index: 1000;
    box-shadow: 0 10px 30px #0008;
  }
  .symbol-dropdown.open { display: block; }
  .symbol-dropdown-count {
    padding: 6px 10px;
    color: #888;
    background: #252830;
    font-size: 11px;
    border-bottom: 1px solid #1e222d;
  }
  .symbol-dropdown-item {
    display: grid;
    grid-template-columns: 58px 72px 62px 64px;
    gap: 8px;
    align-items: center;
    padding: 7px 10px;
    cursor: pointer;
    border-bottom: 1px solid #1e222d;
    font-size: 12px;
  }
  .symbol-dropdown-item:hover, .symbol-dropdown-item.highlighted { background: #363a45; }
  .symbol-dropdown-item.selected { border-left: 3px solid #66BB6A; background: #303641; }
  .sym-name { color: #fff; font-weight: 800; }
  .sym-muted { color: #888; font-size: 11px; }

  .sort-controls { display: flex; align-items: center; gap: 6px; }
  .sort-controls label { color: #888; font-size: 11px; white-space: nowrap; }
  .marker-filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #2a2e39;
    color: #777;
    cursor: pointer;
    font-size: 12px;
  }
  .filter-btn.active { color: #fff; border-color: #66BB6A; background: #66BB6A22; }
  .status-line { color: #888; font-size: 11px; justify-self: end; text-align: right; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(8, minmax(110px, 1fr));
    gap: 6px;
  }
  .summary-card {
    background: #1b1f2a;
    border: 1px solid #2B2B43;
    border-radius: 5px;
    padding: 8px 10px;
  }
  .summary-card .label { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
  .summary-card .value { color: #fff; font-size: 16px; font-weight: 800; margin-top: 3px; }
  .summary-card .sub { color: #777; font-size: 10px; margin-top: 2px; }
  .positive { color: #26a69a !important; }
  .negative { color: #ef5350 !important; }
  .neutral { color: #d1d4dc !important; }

  .main-grid {
    display: grid;
    grid-template-columns: minmax(520px, 1fr) 360px;
    gap: 8px;
    padding: 8px 12px;
  }
  .panel {
    background: #1e222d;
    border: 1px solid #2B2B43;
    border-radius: 5px;
    min-width: 0;
  }
  .panel h2 {
    font-size: 12px;
    color: #fff;
    padding: 8px 10px;
    border-bottom: 1px solid #2B2B43;
    background: #232836;
  }
  #v22Chart { width: 100%; height: calc(100vh - 300px); min-height: 440px; }
  .side-stack { display: grid; gap: 8px; align-content: start; }
  .latest-box { padding: 10px; display: grid; gap: 8px; font-size: 12px; }
  .kv-row { display: flex; justify-content: space-between; gap: 10px; border-bottom: 1px solid #2B2B4322; padding-bottom: 5px; }
  .kv-row .k { color: #888; }
  .kv-row .v { color: #fff; text-align: right; }

  .breakdown { padding: 8px 10px; display: grid; gap: 6px; }
  .break-row { display: grid; grid-template-columns: minmax(80px, 1fr) 50px 60px 60px; gap: 8px; align-items: center; font-size: 11px; }
  .bar-shell { grid-column: 1 / -1; height: 4px; background: #131722; border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; background: #66BB6A; }

  .bottom-grid {
    display: grid;
    grid-template-columns: minmax(520px, 1.3fr) minmax(360px, 0.7fr);
    gap: 8px;
    padding: 0 12px 12px;
  }
  .table-wrap { max-height: 310px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th {
    position: sticky;
    top: 0;
    background: #2a2e39;
    color: #aaa;
    text-align: left;
    padding: 6px 7px;
    z-index: 1;
  }
  td { padding: 5px 7px; border-bottom: 1px solid #1c1f2b; white-space: nowrap; }
  tr:hover { background: #2a2e39; }
  .pill {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid #444;
    border-radius: 999px;
    color: #aaa;
    font-size: 10px;
  }
  .timeline-wrap { max-height: 310px; overflow: auto; padding: 8px 10px; }
  .timeline-item {
    display: grid;
    grid-template-columns: 78px 44px 1fr;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid #2B2B4333;
    font-size: 11px;
  }
  .marker-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .empty, .error { padding: 16px; color: #888; font-size: 13px; }
  .error { color: #ef5350; }

  @media (max-width: 1120px) {
    .controls { grid-template-columns: 1fr; }
    .status-line { justify-self: start; text-align: left; }
    .summary-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
    .main-grid, .bottom-grid { grid-template-columns: 1fr; }
    #v22Chart { height: 460px; }
  }
</style>
</head>
<body>
  <header class="header">
    <div class="top-row">
      <div class="title">
        <h1>V22 Signal Dashboard</h1>
        <p>Drill-down riêng cho dữ liệu, tín hiệu, marker và giao dịch của model V22</p>
      </div>
      <a class="nav-link" href="dashboard.html">← Dashboard so sánh</a>
    </div>

    <div class="controls">
      <div class="symbol-selector">
        <input id="v22SymbolSearch" class="symbol-search-input" type="text" placeholder="Tìm mã: HPG, FPT, DIG..." autocomplete="off">
        <div id="v22SymbolDropdown" class="symbol-dropdown"></div>
      </div>
      <div class="sort-controls">
        <label for="v22Mode">Dữ liệu</label>
        <select id="v22Mode">
          <option value="walk">Walk-forward</option>
          <option value="full">Full history</option>
        </select>
      </div>
      <div class="sort-controls">
        <label for="v22SortBy">Sắp xếp</label>
        <select id="v22SortBy">
          <option value="pnl">PnL cao nhất</option>
          <option value="wr">Win rate</option>
          <option value="trades">Số trades</option>
          <option value="symbol">A-Z</option>
        </select>
      </div>
      <div class="marker-filters">
        <button class="filter-btn active" data-filter="buy">Buy</button>
        <button class="filter-btn active" data-filter="win">Exit lời</button>
        <button class="filter-btn active" data-filter="loss">Exit lỗ</button>
      </div>
      <div id="v22Status" class="status-line">Đang tải V22...</div>
    </div>

    <div id="v22Summary" class="summary-grid"></div>
  </header>

  <main class="main-grid">
    <section class="panel">
      <h2 id="v22ChartTitle">Biểu đồ V22</h2>
      <div id="v22Chart"></div>
    </section>
    <aside class="side-stack">
      <section class="panel">
        <h2>Trạng thái gần nhất</h2>
        <div id="v22Latest" class="latest-box"></div>
      </section>
      <section class="panel">
        <h2>Exit reason breakdown</h2>
        <div id="v22Breakdown" class="breakdown"></div>
      </section>
    </aside>
  </main>

  <section class="bottom-grid">
    <div class="panel">
      <h2>V22 trades</h2>
      <div id="v22Trades" class="table-wrap"></div>
    </div>
    <div class="panel">
      <h2>Signal timeline</h2>
      <div id="v22Timeline" class="timeline-wrap"></div>
    </div>
  </section>

  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="js/v22_state.js"></script>
  <script src="js/v22_chart.js"></script>
  <script src="js/v22_ui.js"></script>
  <script src="js/v22_app.js"></script>
</body>
</html>
